<!DOCTYPE html>
<html>
<head>
    <title>Pango-Track</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="text-brown">🛡️ Pangolin Sighting Tracker</h2>
        <hr>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for msg in messages %}<div class="alert alert-danger">{{ msg }}</div>{% endfor %}
          {% endif %}
        {% endwith %}

        <div class="row">
            <div class="col-md-4">
                <form action="/add" method="POST" class="card p-3 shadow-sm">
                    <input type="text" name="loc" placeholder="Location" class="form-control mb-2" required>
                    <input type="number" step="0.1" name="wgt" placeholder="Weight (kg)" class="form-control mb-2" required>
                    <input type="date" name="dt" class="form-control mb-2" required>
                    <button class="btn btn-success w-100">Log Pangolin</button>
                </form>
            </div>

            <div class="col-md-8">
                <table class="table table-striped bg-white shadow-sm">
                    <thead class="table-dark">
                        <tr><th>Location</th><th>Weight</th><th>Date</th><th>Action</th></tr>
                    </thead>
                    <tbody>
                        {% for log in logs %}
                        <tr>
                            <td>{{ log.location }}</td>
                            <td>{{ log.weight }}kg</td>
                            <td>{{ log.date }}</td>
                            <td><a href="/delete/{{ log.id }}" class="btn btn-sm btn-danger">Remove</a></td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
